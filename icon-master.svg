<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#070c16"/>
      <stop offset=".55" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#0e1626"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#fef3ff"/>
      <stop offset=".35" stop-color="#c4b5fd"/>
      <stop offset=".7" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#6366f1"/>
    </radialGradient>
    <linearGradient id="aur" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset=".5" stop-color="#a855f7"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="blur" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <clipPath id="round"><rect width="512" height="512" rx="112"/></clipPath>
  </defs>
  <g clip-path="url(#round)">
    <rect width="512" height="512" fill="url(#bg)"/>
    <!-- aurora ribbons -->
    <path d="M-40 150 Q150 70 256 130 T560 110" stroke="url(#aur)" stroke-width="34" fill="none" opacity=".5" filter="url(#blur)" stroke-linecap="round"/>
    <path d="M-40 200 Q160 130 290 180 T560 160" stroke="#a855f7" stroke-width="22" fill="none" opacity=".4" filter="url(#blur)" stroke-linecap="round"/>
    <!-- sun glow halo -->
    <circle cx="256" cy="318" r="150" fill="url(#sun)" opacity=".55" filter="url(#glow)"/>
    <!-- rising sun disc (clipped by horizon) -->
    <clipPath id="above"><rect x="0" y="0" width="512" height="318"/></clipPath>
    <circle cx="256" cy="318" r="104" fill="url(#sun)" clip-path="url(#above)"/>
    <!-- horizon glow line -->
    <rect x="40" y="314" width="432" height="6" rx="3" fill="url(#aur)" filter="url(#glow)" opacity=".9"/>
    <rect x="40" y="315" width="432" height="3" rx="1.5" fill="#e2e8f0" opacity=".85"/>
    <!-- light reflection dashes below horizon -->
    <g fill="#a5b4fc" opacity=".6">
      <rect x="196" y="356" width="120" height="7" rx="3.5"/>
      <rect x="166" y="384" width="180" height="6" rx="3"/>
      <rect x="186" y="410" width="140" height="5" rx="2.5"/>
    </g>
  </g>
</svg>

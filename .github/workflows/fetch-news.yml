name: Fetch Morning News

on:
  schedule:
    # 毎日 22:00 UTC = 翌朝 7:00 JST
    - cron: '0 22 * * *'
  workflow_dispatch:  # 手動実行も可能

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate news digest
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL:       ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY:  ${{ secrets.SUPABASE_ANON_KEY }}
          VAPID_PRIVATE_KEY:  ${{ secrets.VAPID_PRIVATE_KEY }}
        run: python scripts/fetch_and_summarize.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/news.json public/news-*.json
          git diff --staged --quiet || git commit -m "chore: morning brief $(date +'%Y-%m-%d')"
          git push
